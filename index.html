<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AD111 Warrant Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AD111 Warrant Generator</h1>

<div class="card">
  <h2>Officer Defaults (Saved Locally)</h2>
  <input id="officerName" placeholder="Officer Name">
  <input id="rank" placeholder="Rank">
  <input id="badge" placeholder="Employee #">
  <input id="agency" value="Aiken County Sheriff's Office">
  <input id="ori" value="SC0020000">
  <button onclick="saveOfficer()">Save</button>
</div>

<div class="card">
  <h2>Defendant Info</h2>
  <input id="defName" placeholder="Full Name">
  <input id="dob" placeholder="DOB">
  <input id="address" placeholder="Address">
  <input id="race" placeholder="Race">
  <input id="sex" placeholder="Sex">
</div>

<div class="card">
  <h2>Warrants</h2>
  <button onclick="addWarrant()">Add Warrant</button>
  <div id="warrants"></div>
</div>

<div class="card">
  <button onclick="generatePDFs()">Generate PDFs</button>
  <button onclick="clearCase()">Clear Case</button>
</div>

<script src="https://unpkg.com/pdf-lib"></script>
<script src="app.js"></script>

</body>
</html>
